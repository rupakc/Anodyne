# PLACEHOLDER ONLY — no real secret values belong in git.
#
# This manifest documents the *shape* of the secrets api-gateway and
# generation-worker expect (see infra/k8s/base/*-deployment.yaml `envFrom`/
# `secretKeyRef` usage) so `kustomize build` renders a complete, deployable
# object graph. In every real environment, replace this either by:
#   - a SealedSecret / External Secrets Operator `ExternalSecret` resource
#     pulling from GCP Secret Manager or Vault, or
#   - `kubectl create secret generic anodyne-secrets --from-literal=... `
#     applied out-of-band and never committed.
#
# CI/CD never applies this file as-is to a real cluster — see docs/deployment.md.
apiVersion: v1
kind: Secret
metadata:
  name: anodyne-secrets
  annotations:
    anodyne.dev/placeholder: "true"
type: Opaque
stringData:
  ANODYNE_DATABASE_URL: "CHANGEME-postgresql+asyncpg://anodyne_app:CHANGEME@postgres:5432/anodyne"
  ANODYNE_SECRET_KEY: "CHANGEME-base64-fernet-key"
  ANODYNE_REDIS_URL: "CHANGEME-redis://redis:6379/0"
  AWS_ACCESS_KEY_ID: "CHANGEME"
  AWS_SECRET_ACCESS_KEY: "CHANGEME"
  KEYCLOAK_CLIENT_SECRET: "CHANGEME"
  AUTH_SECRET: "CHANGEME-openssl-rand-base64-32"
