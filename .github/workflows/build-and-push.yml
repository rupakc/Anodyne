name: Build, Scan, and Push

# Builds the three deployable images (apps/api-gateway, apps/generation-worker,
# apps/web), generates an SBOM per image, fails the run on any HIGH/CRITICAL
# Trivy finding, and — only on `main` or a version tag — pushes to GCP
# Artifact Registry. PR builds exercise the same Dockerfiles + scan gate
# without ever needing cloud credentials, so forked-repo PRs still get
# signal. See docs/deployment.md for the one-time GCP OIDC/WIF setup this
# workflow assumes (Terraform skeleton: infra/terraform/).
on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*.*.*"]

# Cancel superseded runs on the same ref (a new push to a PR branch, or a
# second push to main before the first build finishes) rather than racing
# two pushes to the same Artifact Registry tag.
concurrency:
  group: build-push-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default least-privilege; the push job elevates `id-token: write` only for
# itself, only when it actually runs (main/tags), via the job-level block below.
permissions:
  contents: read

env:
  GAR_LOCATION: ${{ vars.GCP_AR_LOCATION || 'us-central1' }}
  GAR_REPOSITORY: ${{ vars.GCP_AR_REPOSITORY || 'anodyne' }}

jobs:
  build-scan-push:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api-gateway
            dockerfile: apps/api-gateway/Dockerfile
          - image: generation-worker
            dockerfile: apps/generation-worker/Dockerfile
          - image: web
            dockerfile: apps/web/Dockerfile
    permissions:
      contents: read
      # Only needed to mint the OIDC token for google-github-actions/auth;
      # granted here (not at workflow level) so PR runs from forks — which
      # never reach the push step — don't carry it unnecessarily.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and load into the local Docker daemon (not push yet) so the
      # SBOM + Trivy steps below scan the exact bytes that would be pushed.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: anodyne/${{ matrix.image }}:ci
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      # SBOM (SPDX) via syft — anchore/sbom-action wraps the syft binary so
      # no separate install step is needed.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: anodyne/${{ matrix.image }}:ci
          format: spdx-json
          output-file: sbom-${{ matrix.image }}.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image }}
          path: sbom-${{ matrix.image }}.spdx.json
          retention-days: 90

      # Vulnerability gate: fail the run (and therefore the push below never
      # runs) on any HIGH or CRITICAL finding in OS packages or language deps.
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: anodyne/${{ matrix.image }}:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      # --- Push (main branch + version tags only) -------------------------
      - name: Determine push tags
        if: github.event_name == 'push'
        id: tags
        run: |
          set -euo pipefail
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ matrix.image }}"
          TAGS="${IMAGE}:${{ github.sha }}"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAGS="${TAGS},${IMAGE}:${{ github.ref_name }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      # Workload Identity Federation: short-lived OIDC-derived credentials,
      # no long-lived Service Account JSON key ever stored in GitHub. The
      # provider/service-account identifiers are configuration (Terraform
      # outputs), not credentials, so they live in repo/org *variables*
      # (`vars.*`) — see infra/terraform/workload_identity.tf.
      - name: Authenticate to GCP (Workload Identity Federation)
        if: github.event_name == 'push'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        if: github.event_name == 'push'
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
