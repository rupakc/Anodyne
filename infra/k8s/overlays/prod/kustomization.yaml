# See infra/k8s/overlays/dev/kustomization.yaml for the envsubst note on
# `images[].newName` placeholders — same pattern here.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: prod-
namespace: anodyne-prod

resources:
  - ../../base

patches:
  - path: replicas-and-resources.yaml
  - path: hpa-prod.yaml

configMapGenerator:
  - name: anodyne-config
    behavior: merge
    literals:
      - ANODYNE_TEMPORAL_ADDRESS=temporal-frontend.anodyne-prod.svc.cluster.local:7233
      - ANODYNE_RAY_ADDRESS=ray://anodyne-ray-head-svc.anodyne-prod.svc.cluster.local:10001
      - NEXT_PUBLIC_API_BASE=https://api.anodyne.example.com

images:
  - name: api-gateway
    newName: "${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/api-gateway"
    newTag: "${IMAGE_TAG}"
  - name: generation-worker
    newName: "${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/generation-worker"
    newTag: "${IMAGE_TAG}"
  - name: web
    newName: "${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/web"
    newTag: "${IMAGE_TAG}"
