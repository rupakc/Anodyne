[alembic]
script_location = src/anodyne_storage/migrations
prepend_sys_path = .
version_path_separator = os

# DSN is read from the ANODYNE_DB_DSN env var by env.py; sqlalchemy.url here
# is a fallback only used if that env var is unset.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/anodyne

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
