[project]
name = "anodyne-video"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "anodyne-core",
    "anodyne-dataset",
    "anodyne-storage",
    "pydantic>=2.8",
    "sqlalchemy[asyncio]>=2",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
anodyne-core = { workspace = true }
anodyne-dataset = { workspace = true }
anodyne-storage = { workspace = true }
