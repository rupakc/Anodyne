[project]
name = "anodyne-perturbation"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "anodyne-core",
    "anodyne-dataset",
    "pyarrow>=17",
    "numpy>=2",
    "pydantic>=2.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
anodyne-core = { workspace = true }
anodyne-dataset = { workspace = true }
