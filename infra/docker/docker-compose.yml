# Local dev backbone for Anodyne: Postgres (app data), Redis (cache/queues),
# MinIO (S3-compatible object store), Keycloak (OIDC, seeded from
# ./keycloak/anodyne-realm.json via --import-realm), Temporal (workflow
# orchestration for the generation-worker, backed by the same Postgres),
# Ray head (distributed task execution), and Ollama (local/offline LLM
# inference for the demo tenant's model).
#
# NOTE: Ray's internal Redis listens on 6379 inside the ray-head container.
# To avoid a host-port clash with the app `redis` service (also 6379
# internally), the app `redis` service is published on host port 6380
# instead (`6380:6379`) — see ANODYNE_REDIS_URL in .env.example.
#
# Usage: `make up` / `make down` (see repo root Makefile).
services:
  # Bootstrap user is the `postgres` SUPERUSER (used only for migrations, via
  # ANODYNE_DB_DSN, since Alembic needs owner privileges to create/alter
  # tables and RLS policies). The app itself connects as the non-superuser
  # `anodyne_app` role (created by ./postgres/init/01-app-role.sql on first
  # boot) so Postgres row-level security is actually enforced at runtime —
  # superusers, and roles with BYPASSRLS, ignore RLS even with FORCE ROW
  # LEVEL SECURITY. See docs/dev-runbook.md and .env.example.
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: anodyne
    ports: ["5432:5432"]
    volumes:
      - anodyne-postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d anodyne"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    # Mapped to host 6380 (not 6379) because ray-head's internal Redis also
    # binds 6379; set ANODYNE_REDIS_URL=redis://localhost:6380/0 on the host.
    ports: ["6380:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - anodyne-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    ports: ["8080:8080"]

  # Workflow orchestration for generation_worker; reuses the same Postgres
  # instance/credentials as the app (separate `temporal` DB created by
  # auto-setup on first boot).
  temporal:
    image: temporalio/auto-setup:1.25
    depends_on:
      - postgres
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
    ports: ["7233:7233"]

  temporal-ui:
    image: temporalio/ui:2.31.0
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports: ["8088:8080"]

  # Ray head node for distributed generation/task execution. Ray's internal
  # Redis binds 6379 inside this container — see the note on `redis` above
  # for why the app Redis is remapped to host 6380 to avoid a clash.
  ray-head:
    image: rayproject/ray:2.35.0
    command: ray start --head --dashboard-host 0.0.0.0 --block
    ports: ["8265:8265", "6379:6379", "10001:10001"]
    shm_size: "2gb"

  # Local/offline LLM inference (e.g. `ollama pull llama3`), used as the
  # demo tenant's default model so the platform is usable without an
  # external provider API key. See docs/dev-runbook.md.
  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ollama:/root/.ollama

volumes:
  anodyne-postgres-data:
  anodyne-minio-data:
  ollama:
