[project]
name = "anodyne-hitl"
version = "0.1.0"
requires-python = ">=3.12"
# Own bounded context, modelled on anodyne-evaluation: models + ports + a
# SQL registry that imports the shared anodyne_storage.db tables. No
# temporalio dependency here -- signalling/cancelling workflows is wired in
# apps/api-gateway (mirrors how perturbation/evaluation routes take a plain
# `temporalio.client.Client` with no extra port wrapper).
dependencies = [
    "anodyne-core",
    "anodyne-dataset",
    "anodyne-storage",
    "pydantic>=2.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
anodyne-core = { workspace = true }
anodyne-dataset = { workspace = true }
anodyne-storage = { workspace = true }
