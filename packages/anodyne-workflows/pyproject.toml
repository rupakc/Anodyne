[project]
name = "anodyne-workflows"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = ["anodyne-dataset", "anodyne-storage", "anodyne-compute", "anodyne-core",
                "anodyne-tabular", "anodyne-audio", "anodyne-image", "anodyne-video",
                "anodyne-perturbation", "anodyne-evaluation", "anodyne-graph", "anodyne-llm",
                "temporalio>=1.7", "ray>=2.35", "pyarrow>=17"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
anodyne-dataset = { workspace = true }
anodyne-storage = { workspace = true }
anodyne-compute = { workspace = true }
anodyne-core = { workspace = true }
anodyne-tabular = { workspace = true }
anodyne-audio = { workspace = true }
anodyne-image = { workspace = true }
anodyne-video = { workspace = true }
anodyne-perturbation = { workspace = true }
anodyne-evaluation = { workspace = true }
anodyne-graph = { workspace = true }
anodyne-llm = { workspace = true }
