[project]
name = "anodyne-compute"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = ["anodyne-dataset", "anodyne-generation", "anodyne-text", "anodyne-core",
                "anodyne-llm", "anodyne-storage", "ray>=2.35", "pyarrow>=17"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
anodyne-dataset = { workspace = true }
anodyne-generation = { workspace = true }
anodyne-text = { workspace = true }
anodyne-core = { workspace = true }
anodyne-llm = { workspace = true }
anodyne-storage = { workspace = true }
